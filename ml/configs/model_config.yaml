# SkyHawk Roof Edge Detection Model Configuration

model:
  encoder: resnet50
  encoder_weights: imagenet
  in_channels: 3
  classes: 7
  activation: null  # raw logits

classes:
  0: background
  1: roof_surface
  2: ridge
  3: hip
  4: valley
  5: eave_rake
  6: flashing

class_colors:
  background: [0, 0, 0]
  roof_surface: [128, 128, 128]
  ridge: [255, 0, 0]
  hip: [255, 165, 0]
  valley: [0, 0, 255]
  eave_rake: [0, 255, 0]
  flashing: [128, 128, 128]

training:
  image_size: 640
  batch_size: 4
  epochs: 200
  early_stopping_patience: 15
  learning_rate: 0.0001
  weight_decay: 0.01
  optimizer: adamw
  scheduler: cosine_annealing

  # Class weights — edge classes upweighted heavily
  class_weights: [0.1, 0.3, 2.0, 2.0, 2.0, 1.5, 2.0]

  # Combined loss: weighted CE + Dice
  loss:
    ce_weight: 0.5
    dice_weight: 0.5

  # Data augmentation
  augmentation:
    horizontal_flip: true
    vertical_flip: true
    random_rotate_90: true
    brightness_contrast:
      brightness_limit: 0.2
      contrast_limit: 0.2
    color_jitter:
      hue: 0.05
      saturation: 0.2
    random_crop_scale: [0.7, 1.0]

data:
  train_split: 0.70
  val_split: 0.15
  test_split: 0.15
  edge_line_width: 3  # pixels for mask drawing

  # ImageNet normalization
  normalize:
    mean: [0.485, 0.456, 0.406]
    std: [0.229, 0.224, 0.225]

export:
  onnx_opset: 17
  input_shape: [1, 3, 640, 640]
  output_shape: [1, 7, 640, 640]

targets:
  initial_edge_iou: 0.30    # 50-100 images
  usable_edge_iou: 0.50     # 200+ images
  production_edge_iou: 0.65  # 500+ images
